services:
  # Frontend service
  frontend: 
    build: ./frontend
    container_name: frontend_container
    env_file:
      - ./frontend/.env
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"

  # API service
  api: 
    build: ./api
    container_name: api_container
    env_file:
      - ./api/.env
    ports:
      - "5000:5000"

 # Worker service
  worker: 
    build: ./worker
    container_name: worker_container
    env_file:
      - ./worker/.env
    ports:
      - "5001:5001"



