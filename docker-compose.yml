services:
  # Frontend service
  frontend: 
    build: ./frontend
    container_name: frontend_container
    env_file:
      - ./frontend/.env.local
    volumes:
      - ./frontend:/app # Para que funcione el hot reload
      - /app/node_modules # Guada las dependencias para evitar errores
    ports:
      - "5173:5173"
    environment:
      - CHOKIDAR_USEPOLLING=true # Para que funcione el hot reload en Windows

  # API backend service
  api: 
    build: ./api
    container_name: api_container
    env_file:
      - ./api/.env.local
    ports:
      - "5000:5000"
